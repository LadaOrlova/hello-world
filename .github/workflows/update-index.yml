name: Update index.md

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # нужно для git diff HEAD~1

      - name: Generate index.md
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python3 8-Prompts-and-Scripts/scripts/generate-index.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.md .index-descriptions.json
          git diff --staged --quiet || git commit -m "Update index.md [skip ci]"
          git push
