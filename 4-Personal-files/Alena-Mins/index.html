              <div class="flex items-center gap-2 text-xs text-gray-400">

                <span>${p.person}</span>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function renderDetail(p) {
  const siteDisplay = p.site.replace(/^https?:\/\//, '').replace(/\/$/, '');
  return `
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8 fade-in">
      <button onclick="showGrid()" class="inline-flex items-center gap-2 text-sm text-gray-500 hover:text-gray-900 mb-6 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        Все проекты
      </button>

      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="relative">
          <img src="screenshots/${p.id}.png"
               alt="${p.name}"
               class="w-full max-h-[400px] object-cover object-top bg-gray-100"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <div class="hidden items-center justify-center bg-gradient-to-br from-${p.color}-50 to-${p.color}-100 h-[200px]">
            <span class="text-6xl font-bold text-${p.color}-300">${p.name}</span>
          </div>
        </div>

        <div class="p-6 sm:p-8">
          <div class="flex flex-wrap items-center gap-3 mb-1">
            <span class="text-sm font-bold text-${p.color}-600 bg-${p.color}-50 px-2 py-0.5 rounded">#${p.id}</span>
            ${getModelBadge(p.model)}
          </div>

          <h1 class="text-2xl sm:text-3xl font-extrabold text-gray-900 mt-3 mb-1">${p.name}</h1>
          <p class="text-lg text-gray-500 mb-6">${p.subtitle}</p>

          <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8 bg-gray-50 rounded-xl p-4">
            <div>
              <div class="text-xs text-gray-400 uppercase tracking-wide mb-1">Основатель</div>
              <div class="font-semibold text-gray-900">${p.person}</div>
              <div class="text-sm text-gray-500">${p.contact}</div>
            </div>
            <div>
              <div class="text-xs text-gray-400 uppercase tracking-wide mb-1">Стадия</div>
              <div class="font-semibold text-gray-900">${p.stage}</div>
            </div>
            <div>
              <div class="text-xs text-gray-400 uppercase tracking-wide mb-1">Сайт</div>
              <a href="${p.site}" target="_blank" rel="noopener" class="font-semibold text-brand-600 hover:underline break-all">${siteDisplay}</a>
            </div>
          </div>

          <div class="mb-8">
            <h2 class="text-lg font-bold text-gray-900 mb-3">О продукте</h2>
            <p class="text-gray-700 leading-relaxed">${p.description}</p>
          </div>

          <div class="mb-8">
            <h2 class="text-lg font-bold text-gray-900 mb-4">Почему интересен для разбора</h2>
            <div class="space-y-3">
              ${p.whyInteresting.map(item => `
                <div class="detail-section pl-4 py-1">
                  <p class="text-gray-700 text-sm leading-relaxed">${item}</p>
                </div>
              `).join('')}
            </div>
          </div>

          <div class="bg-brand-50 rounded-xl p-5 border border-brand-100">
            <div class="flex items-start gap-3">
              <div class="mt-0.5 bg-brand-500 text-white rounded-lg p-1.5 flex-shrink-0">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
              </div>
              <div>
                <div class="text-xs text-brand-600 uppercase tracking-wide font-semibold mb-1">Паттерн для слушателей</div>
                <p class="text-brand-900 font-medium">${p.pattern}</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="flex justify-between mt-6">
        ${p.id > 1 ? `<button onclick="showDetail(${p.id - 1})" class="inline-flex items-center gap-1 text-sm text-gray-500 hover:text-gray-900 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
          ${products[p.id - 2].name}
        </button>` : '<div></div>'}
        ${p.id < 16 ? `<button onclick="showDetail(${p.id + 1})" class="inline-flex items-center gap-1 text-sm text-gray-500 hover:text-gray-900 transition-colors">
          ${products[p.id].name}
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
        </button>` : '<div></div>'}
      </div>
    </div>
  `;
}

function showGrid() {
  document.getElementById('app').innerHTML = renderGrid();
  history.pushState(null, '', '#');
  window.scrollTo(0, 0);
}

function showDetail(id) {
  const p = products.find(p => p.id === id);
  if (!p) return;
  document.getElementById('app').innerHTML = renderDetail(p);
  history.pushState(null, '', `#${id}`);
  window.scrollTo(0, 0);
}

window.addEventListener('popstate', () => {
  const hash = location.hash.replace('#', '');
  if (hash && !isNaN(hash)) {
    showDetail(parseInt(hash));
  } else {
    showGrid();
  }
});

// Initial render
const hash = location.hash.replace('#', '');
if (hash && !isNaN(hash)) {
  showDetail(parseInt(hash));
} else {
  showGrid();
}
</script>

</body>
</html>
