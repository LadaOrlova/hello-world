function getModelBadge(model) {
  const cls = modelColors[model] || 'bg-gray-100 text-gray-800';
  return `<span class="badge px-2 py-1 rounded-full font-semibold ${cls}">${model}</span>`;
}

function copyProject(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  const text = `Продукт: ${p.name}
${p.subtitle}

Основатель: ${p.person} (${p.contact})
Сайт: ${p.site}
Модель: ${p.model}
Стадия: ${p.stage}

Описание: ${p.description}

Бизнес-задача: ${p.businessTask}

Проблемы: ${p.problems}

Кому продают: ${p.sellTo}

Модель продаж: ${p.salesModel}${p.comments ? `

Комментарии: ${p.comments}` : ''}`;

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn-' + id);
    btn.classList.add('copied');
    btn.innerHTML = `<svg class="w-4 h-4 inline -mt-0.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>Скопировано!`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg class="w-4 h-4 inline -mt-0.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>Скопировать в буфер`;
    }, 2000);
  });
}

function showGrid() {
  document.getElementById('app').innerHTML = renderGrid();
  history.pushState(null, '', '#');
  window.scrollTo(0, 0);
}

function showDetail(id) {
  const p = products.find(p => p.id === id);
  if (!p) return;
  document.getElementById('app').innerHTML = renderDetail(p);
  history.pushState(null, '', `#${id}`);
  window.scrollTo(0, 0);
}

window.addEventListener('popstate', () => {
  const hash = location.hash.replace('#', '');
  if (hash && !isNaN(hash)) {
    showDetail(parseInt(hash));
  } else {
    showGrid();
  }
});

// Initial render
const hash = location.hash.replace('#', '');
if (hash && !isNaN(hash)) {
  showDetail(parseInt(hash));
} else {
  showGrid();
}
</script>
